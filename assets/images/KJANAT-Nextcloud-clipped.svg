<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title" viewBox="0 0 2000 2000">
  <title>KJANAT Nextcloud Logo</title>
  <desc>
    The letter K in black inside a white circle, with the orange Nextcloud cloud icon clipped to the circle boundary
  </desc>

  <defs>
    <!-- Clip content to the inside of the white circle -->
    <clipPath id="contentClip">
      <circle cx="1000" cy="1000" r="900"/>
    </clipPath>
  </defs>

  <!-- Base white disc -->
  <circle cx="1000" cy="1000" r="900" fill="#fff"/>

  <!-- Everything inside the logo gets clipped -->
  <g clip-path="url(#contentClip)">
    <path fill="#000" d="M476 1330v-275l378 419v275zm0-360V820l378 418v150zm0-230V270h378v280l269-280h477l-538 560 418 454v566.1z"/>
    <path fill="#ff5d20" d="M1685.3 1332.9c0 3 1 4 4 4 253.8 42.3 310.702 230.798 310.7 310.1 0 154.316-104.8 353.1-364.7 353h-1296C114.3 2000 .003 1809.1 0 1649c-.003-137.07 76.5-277.9 247.2-351.2.9-.4 2-2 2-4 12.561-219.825 268.483-314.355 411.3-188.4 3.75 3.307 6 2 8-2 232.83-475.784 1016.8-296.915 1016.8 229.4z"/>
  </g>

  <!-- Border on top -->
  <circle cx="1000" cy="1000" r="900" fill="none" stroke="#000" stroke-width="99.205"/>
</svg>

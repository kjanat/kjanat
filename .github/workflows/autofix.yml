---
name: autofix.ci
on:
  schedule: [cron: "0 0 */1 * *"]
  push: { branches: ["master"] }
  workflow_dispatch:
  pull_request:
concurrency: autofix-${{ github.ref }}
jobs:
  autofix:
    runs-on: ubuntu-latest
    permissions: { contents: read }
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: taiki-e/install-action@v2
        with:
          tool: |
            just
            tombi
            dprint
            rust+rustfmt

      - run: bash .github/scripts/dprint-update.sh
      - run: bash .github/scripts/dprint-sort.sh
      - run: dprint fmt --allow-no-files --diff --excludes ".github"

      - uses: autofix-ci/action@v1

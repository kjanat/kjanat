# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: dprint add plugin
on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin name or URL (e.g. kjanat/tex-fmt, exec, or full .wasm/.json URL)"
        required: true
        type: string
      config:
        description: "Target config (auto = wasm→remote.json, non-wasm→exec.json)"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - configs/dprint.remote.json
          - configs/dprint.exec.json
          - configs/dprint.biome.json

concurrency: dprint-add-plugin-${{ github.ref }}

jobs:
  add-plugin:
    runs-on: ubuntu-latest
    permissions: { contents: write, pull-requests: write }
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: kjanat/install-dprint@v1

      - name: Resolve target config
        id: target
        env:
          PLUGIN: ${{ inputs.plugin }}
          CONFIG: ${{ inputs.config }}
        run: |
          set -euo pipefail
          # Slug for a safe git branch name (URLs contain ':' and '//').
          slug="$(printf '%s' "$PLUGIN" | tr -c 'A-Za-z0-9._-' '-' | sed 's/-\{2,\}/-/g; s/^-//; s/-$//')"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          if [[ "$CONFIG" != "auto" ]]; then
            echo "Explicit target: $CONFIG"
            echo "config=$CONFIG" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Resolve the plugin to its URL in a throwaway config, then pick the
          # target by extension: *.wasm → remote.json, *.json → exec.json.
          probe="$(mktemp -d)/probe.json"
          echo '{}' > "$probe"
          dprint config add -c "$probe" "$PLUGIN" </dev/null
          url="$(jq -r '.plugins[-1]' "$probe")"
          echo "Resolved '$PLUGIN' -> $url"
          case "${url%@*}" in
            *.wasm) target="configs/dprint.remote.json" ;;
            *.json) target="configs/dprint.exec.json" ;;
            *) echo "::error::Cannot determine plugin type from URL: $url"; exit 1 ;;
          esac
          echo "Auto target: $target"
          echo "config=$target" >> "$GITHUB_OUTPUT"

      - name: Add plugin
        env:
          PLUGIN: ${{ inputs.plugin }}
          CONFIG: ${{ steps.target.outputs.config }}
        run: |
          dprint config add -c "$CONFIG" "$PLUGIN" </dev/null
          # Re-sort: kjanat plugins first, then alphabetical; keys canonicalised.
          bash .github/scripts/dprint-sort.sh "$CONFIG"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "chore: add dprint plugin ${{ inputs.plugin }} to ${{ steps.target.outputs.config }}"
          title: "chore: add dprint plugin `${{ inputs.plugin }}`"
          body: |
            Adds `${{ inputs.plugin }}` to `${{ steps.target.outputs.config }}`
            via `dprint config add` (config input: `${{ inputs.config }}`).
          branch: dprint-add/${{ steps.target.outputs.slug }}
          delete-branch: true
